<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <link rel="icon" href="img/cropped-Sem-Título-1-32x32.png" sizes="32x32" />
    <link rel="icon" href="img/cropped-Sem-Título-1-192x192.png" sizes="192x192" />
    <link rel="apple-touch-icon-precomposed" href="img/cropped-Sem-Título-1-180x180.png" />
    <meta name="msapplication-TileImage" content="img/cropped-Sem-Título-1-270x270.png" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <title>Cadastro</title>
  </head>
  <body>

      
    <header class="shadow-lg p-3 mb-5 bg-white rounded">
        <nav class="navbar navbar-expand-sm navbar-light bg-light fixed-top">
            <a class="navbar-brand" href="javascript::">
                <img src="img/james-top.png" alt="James Trip">
            </a>
            <button class="navbar-toggler btn-sm" type="button" data-toggle="collapse" data-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
                <ul class="navbar-nav justify-content-end">
                <li class="nav-item">
                    <a class="nav-link" id="addProduct" href="javascritp::"><i class="material-icons float-left">post_add</i>Adicionar produto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="listProduct" href="javascritp::"><i class="material-icons float-left">list_alt</i>Lista de produtos</a>
                </li>
                </ul>
            </div>
        </nav>
    </header>
      
    <section class="container mt-5 mtb-5">
        
        <div id="form" class="row">
            <h4 class="text-center p-5 col-12" >Cadastro de produtos</h4>

            <form id="cadastro" class="needs-validation mx-auto mt-5 col-md-12 col-lg-8">    

                <div class="alert alert-secondary" role="alert">
                    Produto cadastrado...
                </div>
                
                <div class="form-group">
                    <label class="text-muted" for="cod" >Código do Produto</label>
                    <input type="text" class="form-control" name="cod" id="cod" placeholder="Código de Produto" required>
                    <div class="invalid-feedback">
                        Please choose a username.
                    </div>
                </div>
    
                <div class="form-group">
                    <label class="text-muted" for="categoria">Categoria do Produto</label>
                    <input type="text" class="form-control" name="categoria" id="categoria" placeholder="ex.: Eletrônico" required>
                </div>
    
                <div class="form-group">
                    <label class="text-muted" for="nome">Nome do Produto</label>
                    <input type="text" class="form-control" name="nome" id="nome" placeholder="Nome do Produto" required>
                </div>
    
                <div class="form-group">
                    <label class="text-muted" for="produto">Nome do Fornecedor</label>
                    <input type="text" class="form-control" name="fornecedor" id="fornecedor" placeholder="Nome do Fornecedor" required>
                </div>
    
                <div class="form-group">
                    <label class="text-muted" for="valor">Valor do Produto</label>
                    <input type="text" class="form-control" name="valor" id="valor" placeholder="R$" required>
                </div>
                <button type="submit" class="btn-sm btn-dark mt-3">Adicionar</button> 
            </form>
            
        </div>
        
        <div id="list" class="row">
            <h4 class="text-center p-5 col-12" >Lista de produtos</h4>
            <div class="table-responsive-md">
                <table class="table mt-5">
                    <thead>
                      <tr>
                        <th scope="col">Cod</th>
                        <th scope="col">Categoria</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Fornecedor</th>
                        <th scope="col">Valor</th>
                        <th scope="col">Ações</th>
                      </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>

    </section>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div id="rowUpdate" class="modal-dialog" role="document"></div>
    </div>
      
    <footer class="conatiner text-center mt-5">
        <p>2019 © James Tip, Todos direitos reservados.</p>
    </footer>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script src="js/jquery.maskMoney.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
